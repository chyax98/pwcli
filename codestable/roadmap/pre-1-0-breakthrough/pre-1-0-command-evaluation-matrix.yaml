roadmap: pre-1-0-breakthrough
created: 2026-05-04
status: active

protocol:
  required_fields:
    - command
    - group
    - purpose
    - inputs
    - outputs
    - errors
    - recovery
    - focused_checks
    - workflow_links
    - evidence
    - status
    - gaps
  statuses:
    - planned
    - in-progress
    - proven
    - documented
    - blocked
    - dropped
  rules:
    - 每个 command 至少需要 focused check 或真实 Agent dogfood 证据
    - 高风险 command 必须同时有单命令深评和 workflow 串联证据
    - documented 不能伪装成 proven
    - blocked 必须有 issue 或 real-env blocker
    - dropped 必须同步 skill 和 command docs，不能留下半支持状态

commands:
  - command: accessibility
    group: observation
    roadmap_item: command-eval-observation-reading
    status: planned
    notes: 验证 accessibility tree 对 Agent 定位和首读是否有实际帮助
  - command: auth
    group: auth-state
    roadmap_item: command-eval-auth-state-storage-profile
    status: planned
    notes: auth dc 必须进入真实测试/RND 环境证明或 blocker
  - command: batch
    group: tooling-boundary
    roadmap_item: command-eval-batch-code-dashboard-skill-sse
    status: planned
    notes: 只验证结构化 string[][] 稳定子集
  - command: bootstrap
    group: route-mock-bootstrap
    roadmap_item: command-eval-route-mock-bootstrap
    status: planned
    notes: 验证 init script 和 headers 对受控测试是否稳定
  - command: check
    group: interaction-input
    roadmap_item: command-eval-interaction-input
    status: planned
    notes: 和 uncheck/select 一起验证表单控件
  - command: click
    group: interaction-input
    roadmap_item: command-eval-interaction-input
    status: planned
    notes: 高风险动作命令，必须覆盖 stale ref、modal blocked 和 diagnosticsDelta
  - command: code
    group: tooling-boundary
    roadmap_item: command-eval-batch-code-dashboard-skill-sse
    status: planned
    notes: escape hatch，不扩大为长流程 runner
  - command: console
