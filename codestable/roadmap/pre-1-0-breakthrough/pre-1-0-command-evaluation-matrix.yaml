roadmap: pre-1-0-breakthrough
created: 2026-05-04
status: active

protocol:
  required_fields:
    - command
    - group
    - purpose
    - inputs
    - outputs
    - errors
    - recovery
    - focused_checks
    - workflow_links
    - evidence
    - status
    - gaps
  statuses:
    - planned
    - in-progress
    - proven
    - documented
    - blocked
    - dropped
  rules:
    - 每个 command 至少需要 focused check 或真实 Agent dogfood 证据
    - 高风险 command 必须同时有单命令深评和 workflow 串联证据
    - documented 不能伪装成 proven
    - blocked 必须有 issue 或 real-env blocker
    - dropped 必须同步 skill 和 command docs，不能留下半支持状态

