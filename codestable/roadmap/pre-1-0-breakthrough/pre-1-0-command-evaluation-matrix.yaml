    group: observation
    roadmap_item: command-eval-observation-reading
    status: proven
    notes: 2026-05-04 focused check 覆盖 --interactive-only；返回 aria-yaml，包含 Sign in button
  - command: auth
    group: auth-state
    roadmap_item: command-eval-auth-state-storage-profile
