# pwcli project Codex config.
# This repository is maintained through Codex. Keep stable project policy here;
# keep personal auth/provider settings in ~/.codex/config.toml.

model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"

[features]
multi_agent = true

[auto_review]
policy = """
Review all pull request changes against AGENTS.md and .codex/review-guidelines.md.

Report only provable P0/P1 issues. Prioritize workspace mutation identity, session lifecycle
boundaries, command contract drift, recoverability, skill/docs synchronization, and verification
coverage. Treat docs issues as blocking only when they change active contract, hide a limitation,
or create a broken entry point for future agents.
"""

[shell_environment_policy]
include_only = ["PATH", "HOME", "NODE_ENV", "PNPM_HOME", "COREPACK_HOME"]
